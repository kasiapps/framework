name: tests

on:
  push:
    branches:
      - main
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  tests:
    runs-on: ubuntu-24.04
    name: Tests & Coverage

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: pcov

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Execute tests with coverage
        run: |
          mkdir -p .phpunit.cache
          echo "Running Pest with coverage..."
          vendor/bin/pest --coverage --parallel --min=50
          echo "Coverage completed, checking for clover.xml..."
          ls -la clover.xml || echo "clover.xml not found"

      - name: Commit coverage report
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add clover.xml
          if ! git diff --staged --quiet; then
            git commit -m "chore: update coverage report [skip ci]"
            git push
          fi
